<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗣️ 선생님 말 좀 하자</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F0F4FF; --surface:#FFF; --surface2:#F7F8FF;
  --border:#DDE2F5; --accent:#4F6EF7; --accent-dim:#E8EDFF; --accent-dark:#2F4ED4;
  --text:#1A1D2E; --text-sub:#6B7280; --text-muted:#B0B8D4;
  --fav:#F59E0B; --danger:#EF4444; --green:#10B981;
  --radius:14px; --shadow:0 2px 16px rgba(79,110,247,.10);
}
html,body{height:100%;}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}

/* ── 헤더 ── */
.app-header{
  display:flex; align-items:center; gap:10px;
  padding:8px 20px; background:var(--surface);
  border-bottom:1px solid var(--border); flex-shrink:0; height:50px;
}
.app-header h1{font-size:15px;font-weight:700;white-space:nowrap;}
.badge{font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 9px;border-radius:999px;font-weight:600;white-space:nowrap;}
.spacer{flex:1;}
.credit{
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-decoration:none;white-space:nowrap;
  padding:3px 10px;border-radius:999px;
  border:1px solid var(--border);
  transition:all .15s;
}
.credit:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim);}
.controls-inline{display:flex;align-items:center;gap:14px;}
.ctrl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-sub);}
.ctrl-item label{white-space:nowrap;font-weight:600;}
.ctrl-item input[type=range]{width:80px;accent-color:var(--accent);cursor:pointer;}
.ctrl-val{font-size:11px;color:var(--accent);font-weight:700;min-width:38px;}
.ctrl-item select{
  font-family:inherit; font-size:12px; font-weight:600;
  padding:3px 6px; border:1px solid var(--border);
  border-radius:7px; background:var(--surface); color:var(--text);
  cursor:pointer; outline:none; max-width:130px;
}
.ctrl-item select:focus{border-color:var(--accent);}

/* 단축키 뱃지 */
.shortcut-badge{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:22px; height:20px; padding:0 5px;
  border-radius:5px; font-size:10px; font-weight:800;
  background:var(--accent); color:#fff;
  flex-shrink:0; cursor:default; letter-spacing:0.3px;
  user-select:none;
}
.shortcut-badge.unset{
  background:var(--border); color:var(--text-muted);
  border:1px dashed var(--text-muted);
  cursor:pointer; font-size:9px;
}
.shortcut-badge.unset:hover{
  background:var(--accent-dim); border-color:var(--accent); color:var(--accent);
}

/* 단축키 지정 팝업 */
.shortcut-popup{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:var(--surface); border:2px solid var(--accent);
  border-radius:16px; padding:22px 28px; z-index:1000;
  box-shadow:0 8px 40px rgba(79,110,247,.25);
  text-align:center; min-width:260px;
}
.shortcut-popup h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px;}
.shortcut-popup p{font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:16px;}
.shortcut-popup .key-display{
  font-size:28px; font-weight:900; color:var(--accent);
  background:var(--accent-dim); border-radius:10px;
  padding:10px 20px; margin-bottom:16px; display:block;
  letter-spacing:2px;
}
.shortcut-popup .popup-btns{display:flex;gap:8px;justify-content:center;}
.shortcut-popup .popup-btn{
  padding:7px 18px; border-radius:9px; font-family:inherit;
  font-size:13px; font-weight:600; cursor:pointer; border:none;
  transition:all .15s;
}
.shortcut-popup .popup-btn.cancel{
  background:var(--surface2); color:var(--text-sub); border:1px solid var(--border);
}
.shortcut-popup .popup-btn.cancel:hover{background:var(--border);}
.shortcut-popup .popup-btn.del{
  background:#FEE2E2; color:var(--danger);
}
.shortcut-popup .popup-btn.del:hover{background:var(--danger);color:#fff;}
.shortcut-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:999;
}

/* ── 툴바 ── */
.toolbar{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:7px 16px; background:var(--surface2);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.tool-group{
  display:flex; align-items:center; gap:5px;
  padding:5px 10px; background:var(--surface);
  border:1px solid var(--border); border-radius:10px;
}
.tool-label{font-size:11px;font-weight:700;color:var(--text-sub);white-space:nowrap;}

/* 타이머 디스플레이 */
.tool-display{
  font-size:18px; font-weight:800; color:var(--text);
  font-variant-numeric:tabular-nums; min-width:58px;
  text-align:center; letter-spacing:1px;
}
.tool-display.running{color:var(--accent);}
.tool-display.warning{color:#F59E0B;}
.tool-display.danger{color:var(--danger);animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tool-btn{
  width:26px;height:26px; border-radius:7px;
  border:1px solid var(--border); background:var(--surface2);
  cursor:pointer; font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.tool-btn:hover{background:var(--accent-dim);border-color:var(--accent);}
.tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.tool-btn.reset-btn{background:#FEE2E2;border-color:#FECACA;}
.tool-btn.reset-btn:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* 프리셋 버튼 */
.timer-preset{display:flex;gap:3px;align-items:center;}
.preset-btn{
  padding:3px 7px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface2);
  font-size:11px; font-weight:600; color:var(--text-sub);
  cursor:pointer; transition:all .15s; font-family:inherit;
}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* 타이머 조정 버튼 (+1분 -1분) */
.adj-btn{
  padding:3px 7px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface2);
  font-size:11px; font-weight:700; color:var(--text-sub);
  cursor:pointer; transition:all .15s; font-family:inherit;
}
.adj-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.adj-btn:active{transform:scale(.93);}

/* 직접 입력 */
.timer-input{
  width:46px; text-align:center;
  font-family:inherit; font-size:12px; font-weight:700;
  padding:3px 4px;
  border:1px solid var(--border); border-radius:6px;
  background:var(--surface); color:var(--text);
  outline:none;
}
.timer-input:focus{border-color:var(--accent);}

/* 구분선 */
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}

/* 효과음 버튼 */
.sfx-group{
  display:flex; align-items:center; gap:5px;
  padding:5px 10px; background:var(--surface);
  border:1px solid var(--border); border-radius:10px;
}
.sfx-btn{
  padding:4px 10px; border-radius:7px;
  border:1px solid var(--border); background:var(--surface2);
  font-size:13px; cursor:pointer;
  transition:all .15s; font-family:inherit;
  white-space:nowrap; font-weight:600; color:var(--text-sub);
}
.sfx-btn:hover{background:#FFFBEB;border-color:var(--fav);color:var(--fav);}
.sfx-btn:active{transform:scale(.93);}

/* ── 메인 레이아웃 ── */
.main-layout{display:flex;flex:1;overflow:hidden;}

/* 왼쪽 */
.left-panel{
  flex:1; display:flex; flex-direction:column;
  padding:14px 14px 14px 18px; gap:10px;
  overflow:hidden; border-right:1px solid var(--border);
}
.display-board{
  flex:1; background:var(--surface);
  border:2px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.display-board:hover{border-color:var(--accent);}
.display-board.speaking{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(79,110,247,.13),var(--shadow);
}
.board-text{
  font-weight:900; color:var(--text);
  text-align:center; line-height:1.35; letter-spacing:-1px;
  padding:20px 32px; word-break:keep-all;
  font-size:96px; transition:font-size .15s;
}
.board-text.empty{font-size:24px!important;font-weight:400;color:var(--text-muted);letter-spacing:0;}
.board-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--text-muted);}

.speak-wave{
  display:none; position:absolute; bottom:12px; left:50%;
  transform:translateX(-50%); gap:3px; align-items:flex-end; height:20px;
}
.display-board.speaking .speak-wave{display:flex;}
.speak-wave span{display:block;width:4px;background:var(--accent);border-radius:2px;animation:wave .7s ease-in-out infinite;}
.speak-wave span:nth-child(1){height:5px;animation-delay:0s;}
.speak-wave span:nth-child(2){height:15px;animation-delay:.10s;}
.speak-wave span:nth-child(3){height:9px;animation-delay:.20s;}
.speak-wave span:nth-child(4){height:18px;animation-delay:.15s;}
.speak-wave span:nth-child(5){height:7px;animation-delay:.05s;}
.speak-wave span:nth-child(6){height:13px;animation-delay:.18s;}
.speak-wave span:nth-child(7){height:5px;animation-delay:.08s;}
@keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

.input-area{flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.input-row{display:flex;gap:8px;}
.input-row textarea{
  flex:1; font-family:inherit; font-size:16px;
  padding:12px 14px; border:1.5px solid var(--border);
  border-radius:var(--radius); background:var(--surface); color:var(--text);
  resize:none; height:52px; line-height:1.5; outline:none; transition:border-color .2s;
}
.input-row textarea:focus{border-color:var(--accent);}
.input-row textarea::placeholder{color:var(--text-muted);}
.btn-speak{
  flex-shrink:0; width:52px; height:52px;
  border-radius:14px; border:none;
  background:var(--accent); color:#fff; font-size:22px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(79,110,247,.30); transition:all .15s;
}
.btn-speak:hover{background:var(--accent-dark);transform:scale(1.04);}
.btn-speak:active{transform:scale(.97);}
.btn-save-inline{
  padding:8px 0; border-radius:var(--radius);
  border:1.5px dashed var(--border);
  background:transparent; color:var(--text-sub);
  font-size:13px; font-family:inherit; cursor:pointer;
  transition:all .15s; font-weight:500; width:100%;
}
.btn-save-inline:hover{border-color:var(--fav);color:var(--fav);background:#FFFBEB;}

/* 오른쪽 */
.right-panel{
  width:260px; flex-shrink:0;
  display:flex; flex-direction:column;
  padding:14px 14px 14px 12px;
  background:var(--surface2); overflow:hidden;
}
.section-title{font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.section-title .count{font-size:11px;background:var(--accent-dim);color:var(--accent);padding:2px 7px;border-radius:999px;}
.fav-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px;}
.fav-list::-webkit-scrollbar{width:4px;}
.fav-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.fav-item{
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:9px 10px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; transition:all .15s; flex-shrink:0;
}
.fav-item:hover{border-color:var(--accent);background:var(--accent-dim);}
.fav-item:hover .fav-text{color:var(--accent);}
.fav-play-btn{
  flex-shrink:0; width:36px; height:36px;
  border-radius:10px; border:1.5px solid var(--accent);
  background:var(--accent-dim); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.fav-play-btn:hover,.fav-play-btn:active{background:var(--accent);color:#fff;}
.fav-text{flex:1;font-size:14px;font-weight:500;color:var(--text);word-break:keep-all;line-height:1.4;}
.fav-actions{display:flex;gap:4px;flex-shrink:0;}
.fav-edit-input{
  flex:1; font-family:inherit; font-size:14px; font-weight:500;
  padding:4px 8px;
  border:1.5px solid var(--accent); border-radius:8px;
  background:var(--accent-dim); color:var(--text);
  outline:none; min-width:0;
}
.save-btn{ background:var(--accent-dim) !important; color:var(--green) !important; }
.save-btn:hover{ background:var(--green) !important; color:#fff !important; }
.btn-icon{width:26px;height:26px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-icon:hover{background:var(--border);}
.btn-icon.del:hover{background:#FEE2E2;}
.fav-empty{text-align:center;font-size:13px;color:var(--text-muted);padding:30px 10px;line-height:1.8;}

.toast{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#1A1D2E; color:#fff;
  padding:9px 20px; border-radius:999px;
  font-size:13px; font-weight:500;
  opacity:0; pointer-events:none;
  transition:all .3s; white-space:nowrap; z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:700px){
  .main-layout{flex-direction:column;}
  .left-panel{border-right:none;border-bottom:1px solid var(--border);padding:10px;}
  .right-panel{width:100%;height:200px;}
  .toolbar{padding:7px 10px;}
  .controls-inline{gap:8px;}
  .ctrl-item input[type=range]{width:60px;}
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="app-header">
  <h1>🗣️ 선생님 말 좀 하자</h1>
  <span class="badge">선생님스피커</span>
  <a class="credit" href="https://teachnbreathe.tistory.com" target="_blank" title="블라쌤 블로그">
    🌸 블라쌤 · teachnbreathe.tistory.com
  </a>
  <div class="spacer"></div>
  <div class="controls-inline">
    <div class="ctrl-item">
      <label>🎙️ 목소리</label>
      <select id="voiceSelect" title="목소리 선택">
        <option value="">불러오는 중...</option>
      </select>
    </div>
    <div class="ctrl-item">
      <label>🐢 속도</label>
      <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.1" value="1.0">
      <span class="ctrl-val" id="rateVal">보통</span>
    </div>
    <div class="ctrl-item">
      <label>🔊 음량</label>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1">
      <span class="ctrl-val" id="volVal">100%</span>
    </div>
  </div>
</div>

<!-- 툴바 -->
<div class="toolbar">

  <!-- ⏱ 타이머 -->
  <div class="tool-group">
    <span class="tool-label">⏱ 타이머</span>
    <!-- 프리셋 -->
    <div class="timer-preset">
      <button class="preset-btn" data-sec="30">30초</button>
      <button class="preset-btn active" data-sec="60">1분</button>
      <button class="preset-btn" data-sec="180">3분</button>
      <button class="preset-btn" data-sec="300">5분</button>
      <button class="preset-btn" data-sec="600">10분</button>
    </div>
    <div class="divider"></div>
    <!-- +1분 / -1분 -->
    <button class="adj-btn" id="timerPlus" title="+1분">+1분</button>
    <button class="adj-btn" id="timerMinus" title="-1분">-1분</button>
    <div class="divider"></div>
    <!-- 직접입력 (분) -->
    <input type="number" class="timer-input" id="timerCustom" min="1" max="99" placeholder="분" title="분 직접 입력 후 Enter">
    <div class="divider"></div>
    <!-- 디스플레이 + 조작 -->
    <div class="tool-display" id="timerDisplay">01:00</div>
    <button class="tool-btn" id="timerStartBtn" title="시작/일시정지">▶</button>
    <button class="tool-btn reset-btn" id="timerResetBtn" title="리셋">↺</button>
  </div>

  <!-- ⏲ 스탑워치 -->
  <div class="tool-group">
    <span class="tool-label">⏲ 스탑워치</span>
    <div class="tool-display" id="swDisplay">00:00</div>
    <button class="tool-btn" id="swStartBtn">▶</button>
    <button class="tool-btn reset-btn" id="swResetBtn">↺</button>
  </div>

  <!-- 🔔 효과음 -->
  <div class="sfx-group">
    <span class="tool-label">🔔 효과음</span>
    <button class="sfx-btn" onclick="playSfx('bell')">🔔 딩딩</button>
    <button class="sfx-btn" onclick="playSfx('clap')">👏 박수</button>
    <button class="sfx-btn" onclick="playSfx('fart')">💨 방귀</button>
  </div>

</div>

<!-- 메인 -->
<div class="main-layout">
  <div class="left-panel">
    <div class="display-board" id="displayBoard" onclick="reSpeak()" title="클릭 = 다시 읽기">
      <div class="board-text empty" id="boardText">지시사항이 여기에 크게 표시됩니다</div>
      <div class="speak-wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="board-hint">클릭 = 다시 읽기</div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputText" placeholder="지시사항 입력 → Enter  (Shift+Enter = 줄바꿈)" rows="1"></textarea>
        <button class="btn-speak" id="btnSpeak">🔊</button>
      </div>
      <button class="btn-save-inline" onclick="saveFavorite()">⭐ 현재 문장 즐겨찾기에 저장</button>
    </div>
  </div>
  <div class="right-panel">
    <div class="section-title">⭐ 즐겨찾기 <span class="count" id="favCount">0</span></div>
    <div class="fav-list" id="favList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════
   TTS
══════════════════════════ */
var synth = window.speechSynthesis;
var currentText = '', ttsRate = 1.0, ttsVol = 1.0;
var selectedVoiceURI = '';  // 선택된 목소리 URI

/* 목소리 이름을 사람이 읽기 좋게 변환 */
function getFriendlyVoiceName(voice){
  var n = voice.name;
  var nl = n.toLowerCase();

  // ── Google 목소리 ──
  if(nl.includes('google')){
    // 여성 키워드
    if(nl.includes('여성') || nl.includes('female') ||
       nl.includes('yuna') || nl.includes('hana') || nl.includes('heami') ||
       nl.includes('여자') || nl.includes('한국의')){
      return '여성 (Google)';
    }
    // 남성 키워드
    if(nl.includes('남성') || nl.includes('male') ||
       nl.includes('junho') || nl.includes('minho') ||
       nl.includes('남자')){
      return '남성 (Google)';
    }
    // 키워드 불명 → 그냥 Google
    return 'Google 한국어';
  }

  // ── Microsoft 목소리 ──
  if(nl.includes('microsoft') || nl.includes('ms ')){
    // 이름에 포함된 한국 이름 추출
    var msNames = {
      'heami':'혜미', 'heami':'혜미',
      'junho':'준호', 'jinho':'진호', 'minho':'민호',
      'yuna':'유나',  'sunhi':'선희', 'naayeon':'나연',
      'seoyeon':'서연', 'hyunsu':'현수'
    };
    for(var key in msNames){
      if(nl.includes(key)) return msNames[key] + ' (MS)';
    }
    // 한국 여성/남성 표기
    if(nl.includes('female') || nl.includes('여성')) return '여성 (MS)';
    if(nl.includes('male')   || nl.includes('남성')) return '남성 (MS)';
    // 이름에서 MS 제거하고 추출: "Microsoft Heami - Korean (Korean)" → "Heami"
    var clean = n.replace(/Microsoft\s*/i,'').replace(/\s*-.*$/,'').trim();
    return clean ? clean + ' (MS)' : 'MS 한국어';
  }

  // ── Apple / Siri 목소리 ──
  if(nl.includes('siri') || nl.includes('apple')){
    if(nl.includes('여성') || nl.includes('female')) return '여성 (Apple)';
    if(nl.includes('남성') || nl.includes('male'))   return '남성 (Apple)';
    return 'Apple 한국어';
  }

  // ── 기타: 원본 이름 그대로 ──
  return n;
}

/* 목소리 목록 로드 및 드롭다운 구성 */
function loadVoices(){
  var v = synth.getVoices();
  var koVoices = v.filter(function(x){ return x.lang.startsWith('ko'); });
  // 구글 목소리 우선, 그 다음 기타 한국어
  koVoices.sort(function(a,b){
    var aG = a.name.toLowerCase().includes('google') ? 0 : 1;
    var bG = b.name.toLowerCase().includes('google') ? 0 : 1;
    return aG - bG;
  });

  var sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // ── 1순위: Google Translate 남성 (비공식, 키 불필요) ──
  var optGM = document.createElement('option');
  optGM.value = '__gtts_male__';
  optGM.textContent = '남성 (Google)';
  sel.appendChild(optGM);

  // ── 브라우저 내장 한국어 목소리 ──
  if(koVoices.length === 0){
    v.forEach(function(voice){
      var opt = document.createElement('option');
      opt.value = voice.voiceURI;
      opt.textContent = voice.name + ' (' + voice.lang + ')';
      sel.appendChild(opt);
    });
  } else {
    koVoices.forEach(function(voice){
      var opt = document.createElement('option');
      opt.value = voice.voiceURI;
      opt.textContent = getFriendlyVoiceName(voice);
      sel.appendChild(opt);
    });
  }

  // 저장된 선택값 복원
  var saved = localStorage.getItem('sori_voice');
  if(saved){
    var found = false;
    for(var i=0; i<sel.options.length; i++){
      if(sel.options[i].value === saved){ sel.selectedIndex = i; found = true; break; }
    }
    if(found) selectedVoiceURI = saved;
  }
  if(!selectedVoiceURI && sel.options.length > 0){
    selectedVoiceURI = sel.options[0].value;
  }
}

if(synth.onvoiceschanged !== undefined){
  synth.onvoiceschanged = loadVoices;
}
// Chrome은 약간 지연 후 로드되므로 즉시 + 지연 양쪽 호출
loadVoices();
setTimeout(loadVoices, 300);

document.addEventListener('DOMContentLoaded', function(){
  var sel = document.getElementById('voiceSelect');
  if(sel){
    sel.addEventListener('change', function(){
      selectedVoiceURI = this.value;
      localStorage.setItem('sori_voice', selectedVoiceURI);
    });
  }
});

/* ── Google Translate TTS (남성, 비공식) ── */
var gttsAudio = null;
function speakGtts(text, vol, rate){
  if(gttsAudio){ gttsAudio.pause(); gttsAudio = null; }
  // 청크 분할 (200자 제한)
  var chunks = [];
  var words = text.split(' ');
  var chunk = '';
  words.forEach(function(w){
    if((chunk + ' ' + w).length > 180 && chunk){ chunks.push(chunk.trim()); chunk = w; }
    else chunk += (chunk ? ' ' : '') + w;
  });
  if(chunk) chunks.push(chunk.trim());

  var board = document.getElementById('displayBoard');
  board.classList.add('speaking');

  function playChunk(idx){
    if(idx >= chunks.length){ board.classList.remove('speaking'); return; }
    var url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=ko&client=tw-ob&q='
              + encodeURIComponent(chunks[idx]);
    var a = new Audio(url);
    a.volume = vol || 1.0;
    // 속도 조절: playbackRate로 근사
    a.playbackRate = rate || 1.0;
    gttsAudio = a;
    a.onended = function(){ playChunk(idx + 1); };
    a.onerror = function(){
      // CORS 막힌 경우 → Web Speech API 폴백
      board.classList.remove('speaking');
      showToast('⚠️ 구글 남성 목소리 연결 실패 → 기본 목소리로 재생');
      speakWebSpeech(text);
    };
    a.play().catch(function(){
      board.classList.remove('speaking');
      showToast('⚠️ 구글 남성 목소리 연결 실패 → 기본 목소리로 재생');
      speakWebSpeech(text);
    });
  }
  playChunk(0);
}

/* ── Web Speech API TTS (기존) ── */
function getVoice(){
  var v = synth.getVoices();
  if(selectedVoiceURI){
    var found = v.find(function(x){ return x.voiceURI === selectedVoiceURI; });
    if(found) return found;
  }
  return v.find(function(x){ return x.lang==='ko-KR'; }) ||
         v.find(function(x){ return x.lang.startsWith('ko'); }) || null;
}

function speakWebSpeech(text){
  synth.cancel();
  setTimeout(function(){
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = ttsRate; u.volume = ttsVol;
    var v = getVoice(); if(v) u.voice = v;
    var board = document.getElementById('displayBoard');
    u.onstart = function(){ board.classList.add('speaking'); };
    u.onend   = function(){ board.classList.remove('speaking'); };
    u.onerror = function(){ board.classList.remove('speaking'); };
    synth.speak(u);
  }, 80);
}

function speak(text){
  if(!text.trim()) return;
  // 진행 중인 gtts 중단
  if(gttsAudio){ gttsAudio.pause(); gttsAudio = null; }
  synth.cancel();
  currentText = text.trim();
  updateBoard(currentText);

  if(selectedVoiceURI === '__gtts_male__'){
    speakGtts(currentText, ttsVol, ttsRate);
  } else {
    speakWebSpeech(currentText);
  }
}
function reSpeak(){ if(currentText) speak(currentText); }

function updateBoard(text){
  var el=document.getElementById('boardText');
  if(!text){
    el.textContent='지시사항이 여기에 크게 표시됩니다';
    el.classList.add('empty'); el.style.fontSize=''; return;
  }
  el.textContent=text; el.classList.remove('empty');
  var board=document.getElementById('displayBoard');
  var maxW=board.clientWidth*0.88, maxH=board.clientHeight*0.80;
  var len=text.length, size;
  if      (len<=5)  size=140;
  else if (len<=8)  size=120;
  else if (len<=12) size=100;
  else if (len<=18) size=80;
  else if (len<=26) size=64;
  else              size=48;
  var ratio=Math.min(maxW/(len*size*0.6), maxH/(size*1.4), 1);
  size=Math.max(Math.floor(size*ratio),32);
  el.style.fontSize=size+'px';
}

var textarea=document.getElementById('inputText');
textarea.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();triggerSpeak();}
});
document.getElementById('btnSpeak').addEventListener('click',triggerSpeak);
function triggerSpeak(){
  var t=textarea.value.trim(); if(!t) return;
  speak(t); textarea.value=''; textarea.focus();
}

/* ══════════════════════════
   오디오 컨텍스트
══════════════════════════ */
var audioCtx=null;
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq,start,dur,type,vol,pitchEnd){
  var ctx=getCtx();
  var osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime+start);
  if(pitchEnd) osc.frequency.linearRampToValueAtTime(pitchEnd, ctx.currentTime+start+dur);
  gain.gain.setValueAtTime(vol||0.5, ctx.currentTime+start);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
  osc.start(ctx.currentTime+start);
  osc.stop(ctx.currentTime+start+dur+0.05);
}

var audioCache = {};
function getAudio(key){
  if(!audioCache[key]){
    audioCache[key] = new Audio(AUDIO_B64[key]);
  }
  return audioCache[key];
}
function playAudio(key, vol){
  var a = getAudio(key);
  a.currentTime = 0;
  a.volume = vol || 1.0;
  a.play().catch(function(){});
}

/* 화이트노이즈 버퍼 생성 헬퍼 */
function makeNoiseBuf(ctx, dur){
  var n=Math.floor(ctx.sampleRate*dur);
  var buf=ctx.createBuffer(1,n,ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<n;i++) d[i]=Math.random()*2-1;
  return buf;
}

   효과음
══════════════════════════ */
function playSfx(type){
  var ctx=getCtx();
  var now=ctx.currentTime;

  switch(type){

    /* 🔔 딩딩 — 맑은 종소리 두 번 */
    case 'bell':
      tone(1047,0,   1.2,'sine',0.55);
      tone(1319,0,   0.9,'sine',0.22);
      tone(1047,0.5, 1.2,'sine',0.55);
      tone(1319,0.5, 0.9,'sine',0.22);
      break;

    /* ⏰ 타이머 종료 — 디리링~ */
    case 'timerEnd':
      tone(1047,0,    0.25,'sine',0.6);
      tone(1319,0.28, 0.25,'sine',0.6);
      tone(1568,0.56, 0.25,'sine',0.6);
      tone(2093,0.84, 0.6, 'sine',0.65);
      tone(2637,0.84, 0.5, 'sine',0.2);
      break;

    /* 👏 박수 */
    case 'clap':
      playAudio('clap', 0.9);
      break;

    /* 💨 방귀 */
    case 'fart':
      playAudio('fart', 0.9);
      break;
  }
}

/* ══════════════════════════
   타이머
══════════════════════════ */
var timerTotal=60, timerLeft=60;
var timerRunning=false, timerInterval=null, timerFinished=false;

function fmtTime(s){
  var m=Math.floor(s/60), sec=s%60;
  return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
}

function setTimer(sec){
  if(timerRunning) return;
  timerTotal=Math.max(sec,10);
  timerLeft=timerTotal;
  timerFinished=false;
  updateTimerDisplay();
  // 프리셋 active 동기화
  document.querySelectorAll('.preset-btn').forEach(function(b){
    b.classList.toggle('active', parseInt(b.dataset.sec)===timerTotal);
  });
}

// 프리셋 버튼
document.querySelectorAll('.preset-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    setTimer(parseInt(btn.dataset.sec));
  });
});

// +1분 / -1분
document.getElementById('timerPlus').addEventListener('click',function(){
  if(timerRunning){
    timerLeft=Math.min(timerLeft+60, 5999);
    timerTotal=Math.min(timerTotal+60,5999);
  } else {
    setTimer(timerTotal+60);
  }
  updateTimerDisplay();
});
document.getElementById('timerMinus').addEventListener('click',function(){
  if(timerRunning){
    timerLeft=Math.max(timerLeft-60,10);
  } else {
    setTimer(Math.max(timerTotal-60,10));
  }
  updateTimerDisplay();
});

// 직접 입력 (분, Enter 확정)
document.getElementById('timerCustom').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var val=parseInt(this.value);
    if(!isNaN(val)&&val>0) setTimer(val*60);
    this.value='';
    this.blur();
  }
});

function updateTimerDisplay(){
  var el=document.getElementById('timerDisplay');
  el.textContent=fmtTime(timerLeft);
  el.className='tool-display';
  if(timerRunning){
    var pct=timerLeft/timerTotal;
    if     (pct<=0.1)  el.classList.add('danger');
    else if(pct<=0.25) el.classList.add('warning');
    else               el.classList.add('running');
  }
}

document.getElementById('timerStartBtn').addEventListener('click',function(){
  if(timerFinished){timerLeft=timerTotal;timerFinished=false;updateTimerDisplay();return;}
  if(timerRunning){
    clearInterval(timerInterval);
    timerRunning=false;
    this.textContent='▶'; this.classList.remove('active');
    updateTimerDisplay();
  } else {
    if(timerLeft<=0) timerLeft=timerTotal;
    timerRunning=true;
    this.textContent='⏸'; this.classList.add('active');
    var self=this;
    timerInterval=setInterval(function(){
      timerLeft--;
      updateTimerDisplay();
      if(timerLeft<=0){
        clearInterval(timerInterval);
        timerRunning=false; timerFinished=true;
        self.textContent='▶'; self.classList.remove('active');
        playSfx('timerEnd');          // ← 디리링~ 밝은 소리
        showToast('⏰ 타이머 종료!');
      }
    },1000);
  }
});

document.getElementById('timerResetBtn').addEventListener('click',function(){
  clearInterval(timerInterval);
  timerRunning=false; timerFinished=false;
  timerLeft=timerTotal;
  document.getElementById('timerStartBtn').textContent='▶';
  document.getElementById('timerStartBtn').classList.remove('active');
  updateTimerDisplay();
});

══════════════════════════ */
var swElapsed=0, swRunning=false, swInterval=null;
function updateSwDisplay(){
  document.getElementById('swDisplay').textContent=fmtTime(swElapsed);
  document.getElementById('swDisplay').className='tool-display'+(swRunning?' running':'');
}
document.getElementById('swStartBtn').addEventListener('click',function(){
  if(swRunning){
    clearInterval(swInterval); swRunning=false;
    this.textContent='▶'; this.classList.remove('active'); updateSwDisplay();
  } else {
    swRunning=true; this.textContent='⏸'; this.classList.add('active');
    swInterval=setInterval(function(){swElapsed++;updateSwDisplay();},1000);
  }
});
document.getElementById('swResetBtn').addEventListener('click',function(){
  clearInterval(swInterval); swRunning=false; swElapsed=0;
  document.getElementById('swStartBtn').textContent='▶';
  document.getElementById('swStartBtn').classList.remove('active');
  updateSwDisplay();
});

// favorites: [{text:'..', shortcut: null or 1~9}]
var rawFavs = localStorage.getItem('sori_favs2') || localStorage.getItem('sori_favs') || '[]';
var parsedRaw = JSON.parse(rawFavs);

// 구버전(문자열 배열) → 새 형식 마이그레이션
var favorites;
if(Array.isArray(parsedRaw) && parsedRaw.length > 0 && typeof parsedRaw[0] === 'string'){
  favorites = parsedRaw.map(function(t){ return {text: t, shortcut: null}; });
} else if(Array.isArray(parsedRaw) && parsedRaw.length > 0 && typeof parsedRaw[0] === 'object'){
  favorites = parsedRaw;
} else {
  favorites = [];
}

var defaultFavs=[
  "조용히 하세요.","교과서 펴세요.","연필 내려놓으세요.",
  "앞을 봐주세요.","짝과 이야기해 보세요.",
  "발표할 사람 손 들어보세요.","30초 안에 정리하세요.",
  "선생님 화면을 봐 주세요.","자리에 앉으세요.","숙제 꺼내세요."
];
if(favorites.length===0){
  favorites = defaultFavs.map(function(t){ return {text:t, shortcut:null}; });
  saveToStorage();
}

function saveToStorage(){
  localStorage.setItem('sori_favs2', JSON.stringify(favorites));
  // 구버전 키도 동기화 (호환성)
  localStorage.setItem('sori_favs', JSON.stringify(favorites.map(function(f){ return f.text; })));
}
function saveFavorite(){
  var text = textarea.value.trim() || currentText;
  if(!text){ showToast('먼저 문장을 입력해주세요!'); return; }
  if(favorites.find(function(f){ return f.text===text; })){ showToast('이미 저장된 문장이에요 ⭐'); return; }
  favorites.unshift({text:text, shortcut:null});
  saveToStorage(); renderFavorites();
  showToast('즐겨찾기에 저장했어요 ⭐');
}

/* ── 단축키 팝업 ── */
var shortcutTarget = null; // 단축키 지정 대상 인덱스

function openShortcutPopup(i){
  shortcutTarget = i;
  var f = favorites[i];
  var currentKey = f.shortcut ? 'Ctrl + ' + f.shortcut : '없음';

  // 오버레이
  var overlay = document.createElement('div');
  overlay.className = 'shortcut-overlay';
  overlay.id = 'scOverlay';
  document.body.appendChild(overlay);

  // 팝업
  var popup = document.createElement('div');
  popup.className = 'shortcut-popup';
  popup.id = 'scPopup';
  popup.innerHTML =
    '<h3>⌨️ 단축키 지정</h3>' +
    '<p>"' + escHtml(f.text.length > 20 ? f.text.slice(0,20)+'…' : f.text) + '"<br>' +
    '현재: <strong>' + currentKey + '</strong></p>' +
    '<span class="key-display" id="scKeyDisplay">Ctrl + ?</span>' +
    '<p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">키보드에서 숫자 1~9를 눌러 단축키 지정</p>' +
    '<div class="popup-btns">' +
      '<button class="popup-btn cancel" id="scCancel">취소</button>' +
      (f.shortcut ? '<button class="popup-btn del" id="scDel">단축키 해제</button>' : '') +
    '</div>';
  document.body.appendChild(popup);

  // 키 입력 감지
  function onKey(e){
    var num = parseInt(e.key);
    if(num >= 1 && num <= 9){
      e.preventDefault();
      assignShortcut(i, num);
      closeShortcutPopup();
    }
    if(e.key === 'Escape') closeShortcutPopup();
  }
  document.addEventListener('keydown', onKey);
  popup._removeKey = function(){ document.removeEventListener('keydown', onKey); };

  // 미리보기
  document.getElementById('scKeyDisplay').textContent = 'Ctrl + ?';

  document.getElementById('scCancel').addEventListener('click', closeShortcutPopup);
  var delBtn = document.getElementById('scDel');
  if(delBtn) delBtn.addEventListener('click', function(){
    assignShortcut(i, null);
    closeShortcutPopup();
  });
  overlay.addEventListener('click', closeShortcutPopup);
}

function closeShortcutPopup(){
  var popup = document.getElementById('scPopup');
  var overlay = document.getElementById('scOverlay');
  if(popup){ if(popup._removeKey) popup._removeKey(); popup.remove(); }
  if(overlay) overlay.remove();
}

function assignShortcut(i, num){
  // 기존에 같은 번호 사용 중인 항목 해제
  if(num !== null){
    favorites.forEach(function(f, idx){ if(f.shortcut === num && idx !== i) f.shortcut = null; });
  }
  favorites[i].shortcut = num;
  saveToStorage();
  renderFavorites();
  if(num) showToast('⌨️ Ctrl+' + num + ' 단축키 지정 완료!');
  else showToast('단축키를 해제했어요');
}

/* ── 렌더링 ── */
function renderFavorites(){
  var list = document.getElementById('favList');
  document.getElementById('favCount').textContent = favorites.length;
  if(favorites.length === 0){
    list.innerHTML='<div class="fav-empty">자주 쓰는 문장을<br>저장해두세요 👆</div>'; return;
  }
  list.innerHTML = '';
  favorites.forEach(function(fav, i){
    var item = document.createElement('div');
    item.className = 'fav-item';
    item.dataset.idx = i;

    var scLabel = fav.shortcut
      ? '<span class="shortcut-badge" title="단축키: Ctrl+' + fav.shortcut + '" onclick="openShortcutPopup('+i+')" style="cursor:pointer">⌨'+fav.shortcut+'</span>'
      : '<span class="shortcut-badge unset" title="단축키 지정하기" onclick="openShortcutPopup('+i+')">+키</span>';

    item.innerHTML =
      '<button class="fav-play-btn" onclick="speakFav('+i+')" title="탭해서 읽기">🔊</button>'+
      scLabel +
      '<div class="fav-text">'+escHtml(fav.text)+'</div>'+
      '<div class="fav-actions">'+
        '<button class="btn-icon" title="편집" onclick="editFav('+i+')">✏️</button>'+
        '<button class="btn-icon del" title="삭제" onclick="delFav('+i+')">🗑️</button>'+
      '</div>';

    list.appendChild(item);
  });
}

function editFav(i){
  var item = document.querySelector('.fav-item[data-idx="'+i+'"]');
  if(!item) return;
  var curText = favorites[i].text;
  item.innerHTML =
    '<input class="fav-edit-input" type="text" value="'+escHtml(curText)+'" />'+
    '<div class="fav-actions">'+
      '<button class="btn-icon save-btn" title="저장">✅</button>'+
      '<button class="btn-icon" title="취소">✖️</button>'+
    '</div>';

  var input = item.querySelector('.fav-edit-input');
  var btns  = item.querySelectorAll('.btn-icon');

  function doSave(){
    var newText = input.value.trim();
    if(!newText){ showToast('내용을 입력해주세요!'); return; }
    favorites[i].text = newText;
    saveToStorage(); renderFavorites();
    showToast('수정했어요 ✅');
  }
  btns[0].addEventListener('click', doSave);
  btns[1].addEventListener('click', function(){ renderFavorites(); });
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); doSave(); }
    if(e.key==='Escape'){ renderFavorites(); }
  });
  input.focus(); input.select();
}

function speakFav(i){ speak(favorites[i].text); }
function loadFav(i){ textarea.value = favorites[i].text; textarea.focus(); showToast('입력창에 불러왔어요 ✏️'); }
function delFav(i){ favorites.splice(i,1); saveToStorage(); renderFavorites(); showToast('삭제했어요'); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 글로벌 단축키 (Ctrl+1~9) ── */
document.addEventListener('keydown', function(e){
  // 입력 필드 안에서는 무시
  var tag = document.activeElement.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  // 팝업 열려 있으면 무시
  if(document.getElementById('scPopup')) return;

  if(e.ctrlKey && !e.shiftKey && !e.altKey){
    var num = parseInt(e.key);
    if(num >= 1 && num <= 9){
      var fav = favorites.find(function(f){ return f.shortcut === num; });
      if(fav){
        e.preventDefault();
        speak(fav.text);
        showToast('⌨️ Ctrl+' + num + ' — ' + (fav.text.length > 15 ? fav.text.slice(0,15)+'…' : fav.text));
      }
    }
  }
});

/* 토스트 */
var toastTimer=null;
function showToast(msg, dur){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');}, dur||2200);
}

/* 초기화 */
updateTimerDisplay(); updateSwDisplay(); renderFavorites(); textarea.focus();

// 아이폰 Safari 안내
var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
if(isIOS && !localStorage.getItem('ios_hint_shown')){
  setTimeout(function(){
    showToast('📱 아이폰: 🔊 버튼을 탭해서 재생하세요!', 4000);
    localStorage.setItem('ios_hint_shown','1');
  }, 800);
}
</script>
